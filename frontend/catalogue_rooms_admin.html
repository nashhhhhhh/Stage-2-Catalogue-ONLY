<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SATS Stage 2 | Catalogue Room Names</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            background: #f3f7fb;
            color: #0f172a;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 16px 22px;
            border-bottom: 1px solid #dbe4ee;
            background: #ffffff;
        }
        h1 { margin: 0; font-size: 1.18rem; }
        .subtitle { margin: 4px 0 0; color: #64748b; font-size: 0.8rem; font-weight: 750; }
        .header-actions { display: flex; gap: 8px; }
        a, button {
            min-height: 36px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            background: #ffffff;
            color: #0f172a;
            cursor: pointer;
            padding: 8px 12px;
            font: inherit;
            font-size: 0.8rem;
            font-weight: 850;
            text-decoration: none;
        }
        .primary { border-color: #0284c7; background: #0284c7; color: #ffffff; }
        main { padding: 14px; display: grid; gap: 12px; }
        .toolbar {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 220px;
            gap: 10px;
            border: 1px solid #dbe4ee;
            border-radius: 8px;
            background: #ffffff;
            padding: 12px;
        }
        input, select {
            width: 100%;
            min-height: 36px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            padding: 8px 10px;
            font: inherit;
            font-size: 0.82rem;
        }
        .layout-section {
            border: 1px solid #dbe4ee;
            border-radius: 8px;
            background: #ffffff;
            overflow: hidden;
        }
        .layout-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 14px;
            border-bottom: 1px solid #e2e8f0;
            background: #f8fafc;
        }
        .layout-title h2 { margin: 0; font-size: 0.94rem; }
        .layout-title span { color: #64748b; font-size: 0.76rem; font-weight: 800; }
        .room-table { display: grid; }
        .room-row {
            display: grid;
            grid-template-columns: 86px minmax(150px, 1fr) minmax(170px, 1fr) 96px auto;
            gap: 8px;
            align-items: center;
            padding: 9px 12px;
            border-bottom: 1px solid #edf2f7;
        }
        .room-row:last-child { border-bottom: 0; }
        .room-code { font-weight: 900; }
        .default-name { color: #64748b; font-size: 0.78rem; font-weight: 750; }
        .status { color: #64748b; font-size: 0.78rem; font-weight: 800; }
        body.embedded header { display: none; }
        body.embedded main { padding: 0; }
        @media (max-width: 980px) {
            .toolbar, .room-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <script>
        if (new URLSearchParams(window.location.search).get('embedded') === '1') {
            document.body.classList.add('embedded');
        }
    </script>
    <header>
        <div>
            <h1>Room Names</h1>
            <p class="subtitle">Edit catalogue room names and page mappings by layout area.</p>
        </div>
        <div class="header-actions">
            <a href="/catalogue/manage">Catalogue Sources</a>
            <a class="primary" href="/catalogue/manage/machines">Machine Mapping</a>
            <a href="/layout">Back</a>
        </div>
    </header>
    <main>
        <section class="toolbar">
            <input id="search-input" type="search" placeholder="Search room code or name">
            <select id="layout-filter"></select>
        </section>
        <div id="room-sections"></div>
    </main>
    <script>
        const searchInput = document.getElementById('search-input');
        const layoutFilter = document.getElementById('layout-filter');
        const sections = document.getElementById('room-sections');
        let rooms = [];

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, char => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            }[char]));
        }

        function groupedRows() {
            const query = searchInput.value.trim().toLowerCase();
            const layout = layoutFilter.value;
            return rooms.filter(room => {
                const matchesLayout = !layout || room.layout === layout;
                const haystack = [room.code, room.name, room.default_name, room.risk_key].join(' ').toLowerCase();
                return matchesLayout && (!query || haystack.includes(query));
            }).reduce((groups, room) => {
                (groups[room.layout] ||= []).push(room);
                return groups;
            }, {});
        }

        function render() {
            const layouts = [...new Set(rooms.map(room => room.layout))].sort();
            layoutFilter.innerHTML = '<option value="">All Layouts</option>' + layouts.map(layout => `<option value="${escapeHtml(layout)}">${escapeHtml(layout)}</option>`).join('');
            if (!layouts.includes(layoutFilter.dataset.current)) layoutFilter.dataset.current = '';
            if (layoutFilter.dataset.current) layoutFilter.value = layoutFilter.dataset.current;
            renderRows();
        }

        function renderRows() {
            layoutFilter.dataset.current = layoutFilter.value;
            const groups = groupedRows();
            sections.innerHTML = Object.keys(groups).sort().map(layout => {
                const rows = groups[layout].sort((a, b) => a.code.localeCompare(b.code)).map(room => `
                    <div class="room-row" data-code="${escapeHtml(room.code)}">
                        <div class="room-code">${escapeHtml(room.code)}</div>
                        <div class="default-name">${escapeHtml(room.default_name || room.name)}</div>
                        <input class="room-name-input" value="${escapeHtml(room.name)}" aria-label="Room name for ${escapeHtml(room.code)}">
                        <input class="room-page-input" type="number" min="1" step="1" value="${escapeHtml(room.page || '')}" aria-label="Catalogue page for ${escapeHtml(room.code)}">
                        <button type="button" class="save-room-button">Save</button>
                    </div>
                `).join('');
                return `
                    <section class="layout-section">
                        <div class="layout-title"><h2>${escapeHtml(layout)}</h2><span>${groups[layout].length} rooms</span></div>
                        <div class="room-table">${rows}</div>
                    </section>
                `;
            }).join('') || '<p class="status">No rooms found.</p>';
            sections.querySelectorAll('.save-room-button').forEach(button => {
                button.addEventListener('click', () => saveRoom(button.closest('.room-row')));
            });
        }

        async function saveRoom(row) {
            const code = row.dataset.code;
            const name = row.querySelector('.room-name-input').value;
            const page = row.querySelector('.room-page-input').value;
            const button = row.querySelector('.save-room-button');
            button.textContent = 'Saving...';
            const response = await fetch('/api/catalogue/rooms', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code, name, page })
            });
            button.textContent = response.ok ? 'Saved' : 'Failed';
            window.setTimeout(() => button.textContent = 'Save', 1200);
            if (response.ok) await loadRooms();
        }

        async function loadRooms() {
            const response = await fetch(`/api/catalogue/rooms?v=${Date.now()}`);
            rooms = await response.json();
            render();
        }

        searchInput.addEventListener('input', renderRows);
        layoutFilter.addEventListener('change', renderRows);
        loadRooms().catch(error => {
            console.error(error);
            sections.innerHTML = '<p class="status">Room list could not be loaded.</p>';
        });
    </script>
</body>
</html>
