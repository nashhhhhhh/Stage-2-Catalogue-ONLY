<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Placeholder floor plan</title>
  <desc id="desc">A simple grayscale floor plan placeholder for interactive room zones.</desc>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#d8e1ea" stroke-width="1"/>
    </pattern>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#e8eef6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" fill="url(#paper)"/>
  <rect width="1200" height="720" fill="url(#grid)" opacity="0.72"/>
  <g fill="none" stroke="#475569" stroke-linecap="round" stroke-linejoin="round">
    <rect x="70" y="70" width="1060" height="580" stroke-width="8"/>
    <path d="M430 70v225H70" stroke-width="6"/>
    <path d="M690 70v220h440" stroke-width="6"/>
    <path d="M70 430h350v220" stroke-width="6"/>
    <path d="M420 500h350v150" stroke-width="6"/>
    <path d="M770 360h360" stroke-width="6"/>
    <path d="M770 360v290" stroke-width="6"/>
    <path d="M430 295h115" stroke-width="6"/>
    <path d="M630 295h60" stroke-width="6"/>
    <path d="M545 295a42 42 0 0 1 85 0" stroke-width="4"/>
    <path d="M770 430h95" stroke-width="6"/>
    <path d="M950 430h180" stroke-width="6"/>
    <path d="M865 430a42 42 0 0 1 85 0" stroke-width="4"/>
  </g>
  <g fill="#64748b" font-family="Arial, sans-serif" font-size="28" font-weight="700" opacity="0.72">
    <text x="104" y="120">Demo Floor Plan</text>
    <text x="104" y="618">Placeholder image only</text>
  </g>
</svg>
